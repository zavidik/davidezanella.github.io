<p>
Nel corso degli ultimi anni ho avuto l’opportunità di ricoprire il ruolo di Presidente di seggio
in diverse consultazioni elettorali e referendarie.
Si tratta di un incarico di grande responsabilità, che richiede precisione,
attenzione e capacità di gestione delle persone e delle procedure.
</p>

<p>
Il Presidente di seggio è infatti la figura responsabile del corretto svolgimento
di tutte le operazioni di voto e scrutinio, garantendo il rispetto delle normative
e la regolarità del processo elettorale.
</p>

<h3>Le mie esperienze</h3>

<ul>
<li><strong>Giugno 2022</strong> – Referendum abrogativi su giustizia (5 quesiti), seggio 20</li>
<li><strong>Giugno 2024</strong> – Elezioni europee + elezioni comunali, seggio 2</li>
<li><strong>Giugno 2025</strong> – Referendum su lavoro e cittadinanza, seggio 33</li>
<li><strong>Marzo 2026</strong> – Referendum costituzionale sulla separazione delle carriere, seggio 32 (con seggio speciale)</li>
</ul>
<br>
<h3>Le consultazioni</h3>

<p>
Nel 2022 ho partecipato ai referendum abrogativi in materia di giustizia,
che riguardavano temi come l’ordinamento del Consiglio Superiore della Magistratura,
la separazione delle funzioni dei magistrati e altri aspetti del sistema giudiziario.
</p>

<p>
Nel 2024 ho preso parte alle elezioni del Parlamento Europeo,
in cui i cittadini italiani hanno votato i propri rappresentanti a livello europeo,
in contemporanea con le elezioni comunali per il Sindaco e il Consiglio Comunale, vinte poi al ballottaggio da Anna Varisco.
</p>

<p>
Nel 2025 ho presieduto un seggio per referendum legati a tematiche di lavoro e cittadinanza,
mentre nel 2026 ho partecipato a un referendum costituzionale riguardante
la separazione delle carriere tra magistratura giudicante e requirente,
un tema centrale nel dibattito sul sistema giudiziario italiano.
</p>

<h3>Un inizio un po’ particolare</h3>

<p>
Un aspetto curioso del mio percorso è che la prima volta in cui ho svolto questo ruolo
non avevo mai fatto lo scrutatore.
</p>

<p>
Mi ero infatti iscritto sia all’albo dei Presidenti di seggio sia a quello degli scrutatori,
ma sono stato chiamato direttamente come Presidente.
Questo ha significato affrontare l’incarico senza esperienza pratica sul campo,
studiando attentamente tutta la normativa e il manuale operativo.
</p>

<p>
È stata sicuramente una sfida, ma anche un’ottima occasione per mettermi alla prova fin da subito.
</p>

<h3>Il lavoro di squadra</h3>

<p>
Il lavoro al seggio è sempre un lavoro di squadra.
Nel corso delle varie esperienze ho avuto la possibilità di collaborare
con persone diverse e di tutte le età, organizzando e coordinando le attività durante le giornate di voto.
</p>

<p>
Un elemento personale a cui tengo è che ho spesso nominato come segretario mia sorella,
con cui si è creato un ottimo affiatamento lavorativo.
Nell’ultima esperienza, invece, ho scelto di nominare Elisa,
la mia fidanzata, condividendo anche questo tipo di responsabilità.
</p>

<h3>Competenze sviluppate</h3>

<ul>
<li><strong>Gestione delle responsabilità</strong> – Il Presidente è legalmente responsabile del seggio e delle operazioni svolte</li>
<li><strong>Precisione e attenzione ai dettagli</strong> – Ogni procedura deve essere eseguita correttamente e senza errori</li>
<li><strong>Gestione del tempo</strong> – Le operazioni seguono tempistiche precise, soprattutto durante lo scrutinio</li>
<li><strong>Problem solving</strong> – Gestione di imprevisti e situazioni particolari durante le operazioni di voto</li>
<li><strong>Coordinamento di un team</strong> – Organizzazione del lavoro tra scrutatori e segretario</li>
<li><strong>Comunicazione</strong> – Interazione con elettori, rappresentanti di lista e forze dell’ordine</li>
<li><strong>Resistenza allo stress</strong> – Giornate lunghe e impegnative, spesso con ritmi intensi</li>
</ul>
<br>
<h3>Considerazioni finali</h3>

<p>
Questa esperienza mi ha permesso di entrare direttamente in contatto
con il funzionamento concreto della democrazia,
osservando da vicino un momento fondamentale della vita civica del Paese.
</p>

<p>
Allo stesso tempo, è stata un’occasione importante di crescita personale,
sia dal punto di vista organizzativo sia umano.
</p>
