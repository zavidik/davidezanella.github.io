    <p>“La Scuola che sBanda” è un progetto educativo promosso dal Corpo Musicale “Santa Cecilia – 1900” APS di Palazzolo Milanese in collaborazione con alcune scuole 
        primarie di Paderno Dugnano. L’iniziativa nasce con l’obiettivo di avvicinare bambini e ragazzi al mondo della musica e far 
        conoscere gli strumenti tipici della banda attraverso un percorso pratico e coinvolgente.
    </p>
    <p>Il progetto è rivolto principalmente agli alunni delle classi terze, quarte e quinte della scuola primaria. 
        I partecipanti hanno la possibilità di iniziare a suonare uno strumento a fiato o a percussione, messo a disposizione dalla banda, seguendo un percorso di 
        lezioni in piccoli gruppi guidate da insegnanti qualificati. Accanto allo studio dello strumento, sono previsti momenti di musica d’insieme in cui i ragazzi 
        imparano ad ascoltarsi, collaborare e suonare come un vero gruppo musicale.
    </p>
    <p>Oltre all’apprendimento musicale, il progetto pone grande attenzione agli aspetti educativi e sociali: la musica diventa uno strumento per sviluppare creatività, 
        collaborazione e senso di appartenenza al gruppo. L’esperienza si conclude generalmente con un saggio o un concerto finale, durante il quale i ragazzi 
        presentano il lavoro svolto davanti a famiglie, insegnanti e alla comunità.
    </p>
    <p>All’interno di questo progetto collaboro alle attività didattiche lavorando direttamente con i bambini. 
        È un’esperienza che mi piace molto, perché mi permette di accompagnarli nei loro primi passi nella musica e nella scoperta degli strumenti bandistici. 
        Vedere come, lezione dopo lezione, prendono confidenza con lo strumento e con la musica d’insieme è sempre molto stimolante. 
        Allo stesso tempo è anche un percorso di crescita per me, perché con il tempo sto imparando sempre di più cosa significa insegnare e come trasmettere la musica ai più giovani.
    </p>
