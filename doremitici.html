  description: `
    <p>Il gruppo DoReMitici nasce nel settembre del 2023 grazie al grande aiuto di Maria Lores Galli che,
        per la necessità di un intervento musicale durante la Festa dell'Addolorata di Palazzolo Milanese,
        ha voluto proporre alcuni giovani musicisti, molti dei quali membri del
        <a href="banda-palazzolo.html">Corpo Musicale "Santa Cecilia-1900" APS di Palazzolo Milanese</a>.
    </p>
    <p>Dopo aver fatto alcune prove nei giorni precedenti, il 17 settembre 2023 abbiamo debuttato in piazza Hiroshima
        a Palazzolo Milanese. In quell'occasione eravamo in nove a suonare.
        L'evento era dedicato all'Emilia Romagna: c'era un food truck che serviva piadine romagnole
        e un piccolo palco dal quale noi abbiamo suonato per animare la piazza.
        Dato che quella prima esperienza ci aveva entusiasmato molto, abbiamo deciso di non lasciare
        che rimanesse un evento fine a sé stesso, ma di continuare a incontrarci per provare nuovi brani
        e partecipare ad altri eventi.
    </p>
    <p>Da quel momento il gruppo si è piano piano stabilizzato con l'uscita di alcuni musicisti
        e l'ingresso di altri. Oggi contiamo 9 elementi:
        <p style="text-align: center;">
            Davide Baldan - Clarinetto<br>
            Eleonora Monolo - Clarinetto<br>
            Mattia Cristino - Tromba<br>
            Gabriele Busà - Sax Contralto<br>
            Isabel Tedeschi - Corno<br>
            Elisa Frau - Trombone<br>
            Davide Zanella - Trombone<br>
            Francesco Longo - Sax Baritono<br>
            Emanuele Briscese - Percussioni<br>
        </p>
    </p>
    <p>Alcuni di noi studiano musica al liceo musicale o in conservatorio, altri sono già diplomati,
        altri ancora (tra cui anch'io) coltivano la musica come passione personale.
        Per questo motivo siamo un gruppo molto eterogeneo, ma sicuramente la passione per la musica
        è ciò che ci accomuna.
    </p>
    <p>Far parte di un gruppo di questo tipo mi stimola molto e mi sta facendo crescere tanto.
        A differenza di una banda, infatti, siamo noi a decidere tutto ciò che riguarda i DoReMitici,
        con vantaggi e responsabilità che ne derivano.
        Poter scegliere i brani da suonare è sicuramente uno degli aspetti più belli,
        ma allo stesso tempo dobbiamo occuparci anche dell'organizzazione delle prove
        e della pianificazione degli eventi a cui partecipiamo.
        In questo percorso abbiamo sempre l'appoggio della banda di Palazzolo
        e in particolare di Maria Lores Galli e Renato Baldan, a cui dobbiamo davvero molto.
    </p>
  `,
