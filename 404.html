<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — Davide Zanella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .wrap { text-align: center; padding: 80px 20px; animation: fadeUp .6s ease both; }
    .big { font-size: 5rem; margin-bottom: 16px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 12px; }
    p { color: var(--muted); margin-bottom: 32px; font-size: .95rem; }
    .btn { display: inline-block; padding: 12px 28px; background: var(--text); color: var(--bg); border-radius: 10px; text-decoration: none; font-weight: 500; font-size: .9rem; transition: opacity .15s; }
    .btn:hover { opacity: .8; }
  </style>

  <script>
  (function(){
    var v="?v="+Date.now();
    document.querySelectorAll('script[src],link[rel="stylesheet"]')
      .forEach(function(e){
        var a=e.tagName==="LINK"?"href":"src";
        var u=e.getAttribute(a);
        if(u&&u.indexOf("?")===-1&&!u.startsWith("http")&&!u.startsWith("//"))
          e.setAttribute(a,u+v);
      });
  })();
  </script>
</head>
<body>
<div class="container">
  <div class="wrap">
    <div class="big">🎺</div>
    <h1>Pagina non trovata</h1>
    <p>Sembra che questa nota sia stonata. La pagina che cerchi non esiste.</p>
    <a class="btn" href="index.html">Torna alla home</a>
  </div>
</div>
<script src="nav.js"></script>
<script>initNav('');</script>
</body>
</html>
