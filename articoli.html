<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articoli — Davide Zanella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <style>
    :root{--bg:#f7f5f2;--card:#fff;--text:#1a1a1a;--muted:#6b6b6b;--border:#e8e4de;--accent-music:#b5451b;--accent-study:#2b5797;--accent-content:#c4752a;--accent-tech:#2e7d5e;--accent-sport:#4a7c3f;--shadow:0 2px 12px rgba(0,0,0,.07);--radius:16px;--nav-h:56px}
    @media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1c1c1c;--text:#f0ede8;--muted:#888;--border:#2a2a2a;--shadow:0 2px 16px rgba(0,0,0,.4)}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:calc(var(--nav-h) + 40px) 20px 80px}
    .container{max-width:820px;margin:0 auto} a{color:inherit}
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(247,245,242,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px}
    @media(prefers-color-scheme:dark){.navbar{background:rgba(17,17,17,.92)}}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--text);margin-right:auto}
    .nav-links{display:flex;align-items:center;gap:2px}
    .nav-link{text-decoration:none;color:var(--muted);font-size:.83rem;padding:6px 11px;border-radius:8px;transition:color .15s,background .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .nav-link:hover{color:var(--text);background:var(--border)} .nav-link.active{color:var(--text);font-weight:500}
    .nav-divider{width:1px;height:16px;background:var(--border);margin:0 3px}
    .nav-dropdown{position:relative}
    .nav-dropdown-toggle{cursor:pointer;user-select:none}
    .nav-dropdown-toggle .chevron{font-size:.6rem;transition:transform .2s;display:inline-block}
    .nav-dropdown:hover .chevron,.nav-dropdown.open .chevron{transform:rotate(180deg)}
    .nav-dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:6px;min-width:160px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s,transform .2s;z-index:200}
    .nav-dropdown:hover .nav-dropdown-menu,.nav-dropdown.open .nav-dropdown-menu{opacity:1;pointer-events:all;transform:translateY(0)}
    .nav-dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;text-decoration:none;color:var(--text);font-size:.83rem;transition:background .15s}
    .nav-dropdown-item:hover{background:var(--bg)}
    @media(max-width:560px){.nav-link span{display:none}.nav-link{padding:6px 8px;font-size:1rem}}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);margin-bottom:28px;flex-wrap:wrap}
    .breadcrumb a{text-decoration:none;color:var(--muted);transition:color .15s} .breadcrumb a:hover{color:var(--text)}
    .breadcrumb-sep{font-size:.7rem} .breadcrumb-current{color:var(--text)}
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border);color:var(--muted);transition:background .15s,color .15s,border-color .15s;cursor:pointer}
    .tag:hover,.tag.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .tag[data-cat=music]{border-color:var(--accent-music);color:var(--accent-music)} .tag[data-cat=music].active{background:var(--accent-music);color:#fff;border-color:var(--accent-music)}
    .tag[data-cat=study]{border-color:var(--accent-study);color:var(--accent-study)} .tag[data-cat=study].active{background:var(--accent-study);color:#fff;border-color:var(--accent-study)}
    .tag[data-cat=content]{border-color:var(--accent-content);color:var(--accent-content)} .tag[data-cat=content].active{background:var(--accent-content);color:#fff;border-color:var(--accent-content)}
    .tag[data-cat=tech]{border-color:var(--accent-tech);color:var(--accent-tech)} .tag[data-cat=tech].active{background:var(--accent-tech);color:#fff;border-color:var(--accent-tech)}
    .tag[data-cat=sport]{border-color:var(--accent-sport);color:var(--accent-sport)} .tag[data-cat=sport].active{background:var(--accent-sport);color:#fff;border-color:var(--accent-sport)}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:8px;animation:fadeUp .5s ease both}
    .page-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px;animation:fadeUp .5s .05s ease both}
    .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;animation:fadeUp .5s .1s ease both}
    .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;animation:fadeUp .5s .15s ease both}
    .blog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;color:var(--text);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:transform .2s,box-shadow .2s}
    .blog-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.11)}
    .blog-card-cover{width:100%;height:150px;object-fit:cover;display:block}
    .blog-card-body{padding:16px 18px 14px;display:flex;flex-direction:column;gap:7px;flex:1}
    .blog-card-tags{display:flex;flex-wrap:wrap;gap:5px}
    .blog-card-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;line-height:1.3}
    .blog-card-excerpt{font-size:.82rem;color:var(--muted);line-height:1.55;flex:1}
    .blog-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:4px}
    .blog-card-arrow{transition:transform .15s} .blog-card:hover .blog-card-arrow{transform:translateX(3px)}
    .empty{color:var(--muted);font-size:.9rem;padding:32px 0;text-align:center}
    .scroll-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;z-index:99;text-decoration:none;color:var(--text)}
    .scroll-top.visible{opacity:1;transform:translateY(0)}
    footer{text-align:center;margin-top:60px;font-size:.78rem;color:var(--muted)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:500px){.blog-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">Davide Zanella</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 <span>Home</span></a>
    <div class="nav-divider"></div>
    <a class="nav-link" href="bacheca.html">📌 <span>Bacheca</span></a>
    <a class="nav-link active" href="articoli.html">📝 <span>Articoli</span></a>
    <div class="nav-divider"></div>
    <div class="nav-dropdown">
      <span class="nav-link nav-dropdown-toggle">👤 <span>Su di me</span> <span class="chevron">▾</span></span>
      <div class="nav-dropdown-menu">
        <a class="nav-dropdown-item" href="about.html">👤 Chi sono</a>
        <a class="nav-dropdown-item" href="cv.html">📄 Curriculum</a>
        <a class="nav-dropdown-item" href="contatti.html">✉️ Contatti</a>
      </div>
    </div>
  </div>
</nav>
<div class="container">
  <nav class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Articoli</span></nav>
  <h1 class="page-title">📝 Articoli</h1>
  <p class="page-sub" id="post-count"></p>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="blog-grid" id="blog-grid"></div>
  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>
<a class="scroll-top" id="scrollTop" href="#" title="Torna su">&#8593;</a>
<script src="posts.js"></script>
<script>
const CATS={music:1,study:1,content:1,tech:1,sport:1};
const CAT_LABELS={music:'Musica',study:'Formazione',content:'Contenuti',tech:'Tech',sport:'Sport'};
function formatDate(d){const[y,m,day]=d.split('-');const M=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];return `${parseInt(day)} ${M[parseInt(m)]} ${y}`;}

// solo articoli NON pinnati
const ARTICLES = POSTS.filter(p => !p.pinned);
let activeFilter = null;

const allCats=[...new Set(ARTICLES.flatMap(p=>p.tags.filter(t=>CATS[t])))];
const filterBar=document.getElementById('filter-bar');
filterBar.innerHTML=allCats.map(c=>`<span class="tag" data-cat="${c}" data-filter="${c}">${CAT_LABELS[c]||c}</span>`).join('');
filterBar.querySelectorAll('.tag').forEach(btn=>btn.addEventListener('click',()=>{
  activeFilter=activeFilter===btn.dataset.filter?null:btn.dataset.filter;
  filterBar.querySelectorAll('.tag').forEach(b=>b.classList.toggle('active',b.dataset.filter===activeFilter));
  renderGrid();
}));

function buildCard(p){
  const cover=p.cover?`<img class="blog-card-cover" src="${p.cover}" alt="${p.title}" loading="lazy">`:'';
  const tags=p.tags.slice(0,4).map(t=>`<span class="tag" ${CATS[t]?`data-cat="${t}"`:''} style="pointer-events:none">${t}</span>`).join('');
  return `<a class="blog-card" href="post.html?id=${p.id}">
    ${cover}
    <div class="blog-card-body">
      <div class="blog-card-tags">${tags}</div>
      <div class="blog-card-title">${p.title}</div>
      <div class="blog-card-excerpt">${p.excerpt}</div>
      <div class="blog-card-footer"><span>${formatDate(p.date)}</span><span class="blog-card-arrow">&#8594;</span></div>
    </div>
  </a>`;
}

function renderGrid(){
  const filtered=activeFilter?ARTICLES.filter(p=>p.tags.includes(activeFilter)):ARTICLES;
  document.getElementById('post-count').textContent=`${filtered.length} articol${filtered.length===1?'o':'i'}`;
  document.getElementById('blog-grid').innerHTML=filtered.length?filtered.map(buildCard).join(''):'<p class="empty">Nessun articolo trovato.</p>';
}
renderGrid();

const st=document.getElementById('scrollTop');
window.addEventListener('scroll',()=>st.classList.toggle('visible',window.scrollY>300));
st.addEventListener('click',e=>{e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
document.querySelectorAll('.nav-dropdown').forEach(d=>{
  d.querySelector('.nav-dropdown-toggle').addEventListener('click',e=>{e.stopPropagation();d.classList.toggle('open');});
});
document.addEventListener('click',()=>document.querySelectorAll('.nav-dropdown').forEach(d=>d.classList.remove('open')));
</script>
</body>
</html>
