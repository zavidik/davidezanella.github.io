<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articoli — Davide Zanella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <link rel="stylesheet" href="style.css">
<script>
  (function(){
    var v="?v="+Date.now();
    document.querySelectorAll('script[src],link[rel="stylesheet"]')
      .forEach(function(e){
        var a=e.tagName==="LINK"?"href":"src";
        var u=e.getAttribute(a);
        if(u&&u.indexOf("?")===-1&&!u.startsWith("http")&&!u.startsWith("//"))
          e.setAttribute(a,u+v);
      });
  })();
  </script>

</head>
<body>
<div class="container">
  <nav class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">Articoli</span>
  </nav>
  <h1 class="page-title">📝 Articoli</h1>
  <p class="page-sub" id="post-count"></p>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="blog-grid" id="blog-grid"></div>
  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>

<script src="posts.js"></script>
<script src="blog-utils.js"></script>
<script src="nav.js"></script>
<script>
  initNav('articoli.html');

  const ARTICLES = getArticles();
  let activeFilter = null;

  const allCats = [...new Set(ARTICLES.flatMap(p => p.tags.filter(t => CATS[t])))];
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = allCats.map(c =>
    `<span class="tag" data-cat="${c}" data-filter="${c}">${CAT_LABELS[c] || c}</span>`
  ).join('');
  filterBar.querySelectorAll('.tag').forEach(btn => btn.addEventListener('click', () => {
    activeFilter = activeFilter === btn.dataset.filter ? null : btn.dataset.filter;
    filterBar.querySelectorAll('.tag').forEach(b => b.classList.toggle('active', b.dataset.filter === activeFilter));
    renderGrid();
  }));

  function renderGrid() {
    const filtered = activeFilter ? ARTICLES.filter(p => p.tags.includes(activeFilter)) : ARTICLES;
    document.getElementById('post-count').textContent = filtered.length + ' articol' + (filtered.length === 1 ? 'o' : 'i');
    document.getElementById('blog-grid').innerHTML = filtered.length
      ? filtered.map(buildArticleCard).join('')
      : '<p class="empty-state">Nessun articolo trovato.</p>';
  }
  renderGrid();
</script>
</body>
</html>
