initActivity({
  title: 'YouTube',
  role: 'Hobby · Dal 2020',            // ← aggiorna l'anno
  categoryLabel: 'Media',

  // Tags multipli: filtra articoli ed eventi che hanno ALMENO uno di questi tag

  cover: 'img/copertine/youtube_copertina.jpg',                                  // es. 'img/cover-palazzolo.jpg'

  description: `
    <p>Dal 2020 pubblico video di vario genere sul mio canale YouTube. Fin da piccolo mi ha sempre affascinato
    l'idea di creare video che documentassero le mie attività e le mie esperienze.
    Nel 2020 ho quindi aperto il mio canale e ho caricato i primi contenuti.
    <a href="https://youtube.com/playlist?list=PL1o1uYsfqEiOtumaJ08OSP-hdBa5JP4xN&si=04KQv15VaB6cjzX4" target="_blank" rel="noopener noreferrer">I primi video</a> raccontavano 
    una gita scolastica di una settimana in Sardegna, per la precisione a Isuledda,
    dove dovevamo imparare ad andare in barca a vela.
    </p>
    <p>Con il tempo ho iniziato a realizzare video anche di altre esperienze personali:
        vacanze con amici o con la famiglia, giri in bici, allenamenti di atletica e concerti con le bande.
        Quest’ultima attività è diventata una parte molto importante del mio canale YouTube,
        dato che negli ultimi anni la musica ha occupato uno spazio sempre più grande nella mia vita.
        Nonostante questo, continuo comunque a pubblicare anche video delle altre attività.
    </p>
    <p>Grazie a questa passione per i video, nel tempo ho acquistato alcune videocamere e microfoni
        e, soprattutto, ho imparato a montare i miei filmati. Non a livello professionale,
        ma comunque in modo che ritengo soddisfacente.
    </p>
    <p>Questa competenza mi ha permesso anche di creare contenuti per <a href="https://youtube.com/playlist?list=PLkCKC-9ELJ8grDcW--EYJjGt1O4xUz9AK&si=wj2PdDCvESp1tPAZ" target="_blank" rel="noopener noreferrer">La Fenice</a>
        (la società di atletica di cui facevo parte) e attualmente per i <a href="doremitici.html">DoReMitici</a>
        e per la <a href="banda-palazzolo.html">Banda di Palazzolo Milanese</a>. I video di questi ultimi due gruppi sono pubblicati
        sul mio canale YouTube all’interno di playlist dedicate.
    </p>
    <p>Pur rimanendo un hobby, cerco sempre di migliorare la qualità dei miei video,
        sia dal punto di vista delle riprese e della risoluzione, sia per quanto riguarda il montaggio.
        È un’attività che richiede molto tempo e per questo non sempre si riescono a ottenere
        i risultati che si immaginano. La speranza che i miei video possano interessare sempre più persone
        c’è, ma sono comunque felice soprattutto del fatto di star creando dei ricordi
        che potrò io stesso riguardare in futuro.
    </p>
    <p>Nei link qui sotto si rimanda al mio canale YouTube e ai profili social di "Here, The Series" (<a href="here-the-series.html">link se vuoi approfondire questo nome</a>).
    </p>
  `,

  links: [
