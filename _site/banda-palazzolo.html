    <p>Il Corpo Musicale “Santa Cecilia – 1900” APS di Palazzolo Milanese è una delle realtà musicali più radicate del territorio. 
      Fondato nel 1900 per iniziativa di don Filippo Anghilieri e di alcuni giovani dell’oratorio, il complesso bandistico rappresenta da 
      oltre un secolo un punto di riferimento per la vita culturale e sociale della comunità. 
      Per approfondire la storia dell’associazione rimando al sito ufficiale, nel primo link qui sotto.
    </p>
    <p>Sono entrato a far parte della banda nel 2018 come trombonista, poco dopo essermi trasferito a Palazzolo Milanese. 
      Da allora partecipo attivamente alla vita dell’associazione, prendendo parte all’attività concertistica e collaborando ad alcuni 
      progetti educativi dedicati ai più giovani.
    </p>
    <p>Oggi la banda è diretta dal maestro Enrico Tiso e conta circa cinquanta musicisti. 
      È una realtà molto attiva sul territorio e partecipa regolarmente a concerti, sfilate e manifestazioni civili e religiose, 
      contribuendo alla vita culturale della città.
    </p>
    <p>Grande attenzione è rivolta anche alla formazione musicale delle nuove generazioni. 
      Tra le iniziative dell’associazione ci sono la banda giovanile Junior Band e il progetto <a href="scuola-che-sbanda.html">“La Scuola che sBanda” (clicca per approfondire)</a>
      , un percorso educativo realizzato nelle scuole del territorio con il quale collaboro attivamente.
    </p>
    <p>L’obiettivo della banda è diffondere la cultura bandistica e avvicinare bambini, ragazzi e adulti al mondo della musica, 
      favorendo allo stesso tempo la crescita culturale e l’aggregazione sociale della comunità.
    </p>
  `,
