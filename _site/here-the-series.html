  description: `
    <p>Here, The Series nasce come spazio dedicato ai contenuti dei miei video e delle esperienze che racconto sul mio canale YouTube.
    </p>
    <p>Dal 2020, in concomitanza con l'apertura del <a href="youtube.html">mio canale YouTube</a>,
        ho creato sui vari social network alcuni profili chiamati "Here, The Series".
        La scelta è nata dal fatto che non volevo mischiare i contenuti pubblicati per il mio canale
        con quelli dei miei profili personali e privati.
        In questo modo posso mantenere una certa privacy online e decidere cosa pubblicare
        come Davide "creatore di video" e cosa invece condividere solamente con amici o conoscenti.
    </p>
    <p>La prima serie di video che ho realizzato riguardava una gita in Sardegna e si chiamava
        <a href="https://youtube.com/playlist?list=PL1o1uYsfqEiOtumaJ08OSP-hdBa5JP4xN&si=04KQv15VaB6cjzX4" target="_blank" rel="noopener noreferrer">"Isuledda, The Series"</a>. 
        Da lì è nata l’idea di chiamare questi profili "Here, The Series",
        con l’intenzione di creare una nuova serie di video per ogni viaggio.
        Le varie serie avrebbero quindi mantenuto una struttura simile nel nome,
        sostituendo semplicemente il luogo del viaggio alla parola "Here".
    </p>
    <p>Col tempo mi sono reso conto che questo nome non è particolarmente efficace
        e oggi non rappresenta nemmeno più perfettamente i contenuti che pubblico,
        dato che ho iniziato a realizzare video di generi diversi e non solo di viaggio.
        Per il momento però non ho cambiato nome: in fondo potrebbe anche rimanere così,
        come ricordo di come tutto è iniziato.
    </p>
    <p>Il canale YouTube, invece, ha sempre avuto il mio nome "Davide Zanella".
        Non ho mai voluto nascondermi dietro uno pseudonimo e sono felice di pubblicare
        i miei contenuti con il mio vero nome.
        Inoltre non avevo idee convincenti per un alias, quindi ho semplicemente mantenuto
        il nome dell’account Google con cui ho aperto il canale.
    </p>
    <p>Infine ho aperto anche un <a href="https://davidezanella.altervista.org" target="_blank" rel="noopener noreferrer">blog</a> (inizialmente non si chiamava "Here, The Series", ma questa è un'altra storia), ospitato su Altervista.
        Oggi è un progetto abbastanza fermo: pubblico principalmente articoli con i link ai miei video YouTube. 
        Però l'ho utilizzato anche per ospitare il <a href="doremitici.html">sito dei DoReMitici</a>.
    </p>
  `,
