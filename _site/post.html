<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Davide Zanella</title>
  <meta name="description" content="Post di Davide Zanella."><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <style>

    :root {
      --bg:#f7f5f2;--card:#ffffff;--text:#1a1a1a;--muted:#6b6b6b;--border:#e8e4de;
      --accent-music:#b5451b;--accent-study:#2b5797;--accent-content:#c4752a;
      --accent-tech:#2e7d5e;--accent-about:#5b3f8a;
      --shadow:0 2px 12px rgba(0,0,0,.07);--radius:16px;--nav-h:56px;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#111;--card:#1c1c1c;--text:#f0ede8;--muted:#888;--border:#2a2a2a;--shadow:0 2px 16px rgba(0,0,0,.4)}
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:calc(var(--nav-h) + 40px) 20px 80px}
    .container{max-width:820px;margin:0 auto}
    a{color:inherit}

    /* ── NAVBAR ── */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(247,245,242,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px}
    @media(prefers-color-scheme:dark){.navbar{background:rgba(17,17,17,.88)}}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--text);margin-right:auto;letter-spacing:-.01em}
    .nav-links{display:flex;align-items:center;gap:4px}
    .nav-link{text-decoration:none;color:var(--muted);font-size:.83rem;font-weight:400;padding:6px 12px;border-radius:8px;transition:color .15s,background .15s;white-space:nowrap}
    .nav-link:hover{color:var(--text);background:var(--border)}
    .nav-link.active{color:var(--text);font-weight:500}
    .nav-divider{width:1px;height:16px;background:var(--border);margin:0 4px}
    @media(max-width:520px){.nav-link span{display:none}.nav-link{padding:6px 8px;font-size:1.1rem}}

    /* ── TAGS ── */
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:background .15s,color .15s,border-color .15s;cursor:pointer}
    .tag:hover,.tag.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .tag[data-cat=music]{border-color:var(--accent-music);color:var(--accent-music)}
    .tag[data-cat=study]{border-color:var(--accent-study);color:var(--accent-study)}
    .tag[data-cat=content]{border-color:var(--accent-content);color:var(--accent-content)}
    .tag[data-cat=tech]{border-color:var(--accent-tech);color:var(--accent-tech)}
    .tag[data-cat=about]{border-color:var(--accent-about);color:var(--accent-about)}
    .tag[data-cat=music].active{background:var(--accent-music);color:#fff;border-color:var(--accent-music)}
    .tag[data-cat=study].active{background:var(--accent-study);color:#fff;border-color:var(--accent-study)}
    .tag[data-cat=content].active{background:var(--accent-content);color:#fff;border-color:var(--accent-content)}
    .tag[data-cat=tech].active{background:var(--accent-tech);color:#fff;border-color:var(--accent-tech)}
    .tag[data-cat=about].active{background:var(--accent-about);color:#fff;border-color:var(--accent-about)}

    /* ── SCROLL TO TOP ── */
    .scroll-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;z-index:99;text-decoration:none;color:var(--text)}
    .scroll-top.visible{opacity:1;transform:translateY(0)}
    .scroll-top:hover{box-shadow:0 4px 20px rgba(0,0,0,.15)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    .container{max-width:680px}
    .post-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;animation:fadeUp .5s ease both}
    .post-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.2rem);font-weight:700;line-height:1.2;letter-spacing:-.02em;margin-bottom:12px;animation:fadeUp .5s .05s ease both}
    .post-meta{font-size:.82rem;color:var(--muted);margin-bottom:36px;animation:fadeUp .5s .08s ease both}
    .post-cover{width:100%;border-radius:var(--radius);margin-bottom:36px;display:block;animation:fadeUp .5s .1s ease both;max-height:420px;object-fit:cover}
    .post-body{animation:fadeUp .5s .12s ease both;line-height:1.8;font-size:1rem}
    .post-body p{margin-bottom:1.2em}
    .post-body h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin:2em 0 .6em}
    .post-body h3{font-size:1rem;font-weight:600;margin:1.6em 0 .4em}
    .post-body ul,.post-body ol{margin:0 0 1.2em 1.4em}
    .post-body li{margin-bottom:.4em}
    .post-body img{width:100%;border-radius:10px;margin:1em 0}
    .post-body blockquote{border-left:3px solid var(--border);padding:.6em 1.2em;color:var(--muted);margin:1.2em 0;font-style:italic}
    .post-body a{text-decoration:underline;text-underline-offset:3px}
    .post-divider{height:1px;background:var(--border);margin:48px 0 36px}
    .related-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:16px}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
    .related-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:8px;transition:transform .2s,box-shadow .2s}
    .related-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09)}
    .related-card-title{font-weight:500;font-size:.9rem;line-height:1.3}
    .related-card-date{font-size:.75rem;color:var(--muted)}
    .not-found{text-align:center;padding:80px 0;color:var(--muted)}
    footer{text-align:center;margin-top:60px;font-size:.78rem;color:var(--muted)}
  </style>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">Davide Zanella</a>
  <div class="nav-links"><a class="nav-link" href="index.html">🏠 <span>Home</span></a><div class="nav-divider"></div><a class="nav-link active" href="blog.html">📝 <span>Aggiornamenti</span></a><a class="nav-link" href="about.html">👤 <span>Chi sono</span></a><a class="nav-link" href="cv.html">📄 <span>CV</span></a><a class="nav-link" href="contatti.html">✉️ <span>Contatti</span></a></div>
</nav>
<div class="container">
  <div id="post-content"></div>
  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>
<a class="scroll-top" id="scrollTop" href="#" title="Torna su">&#8593;</a>
<script src="posts.js"></script>
<script>
const CATS={music:1,study:1,content:1,tech:1,about:1};
function formatDate(d){const[y,m,day]=d.split('-');const M=['','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];return `${parseInt(day)} ${M[parseInt(m)]} ${y}`;}
const post=POSTS.find(p=>p.id===new URLSearchParams(window.location.search).get('id'));
const container=document.getElementById('post-content');
if(!post){
  container.innerHTML='<div class="not-found"><p>Post non trovato.</p><br><a href="blog.html" style="text-decoration:underline">Torna agli aggiornamenti</a></div>';
}else{
  document.title=post.title+' — Davide Zanella';
  const tags=post.tags.map(t=>`<span class="tag" ${CATS[t]?`data-cat="${t}"`:''}>${t}</span>`).join('');
  const cover=post.cover?`<img class="post-cover" src="${post.cover}" alt="${post.title}" loading="lazy">`:'';
  const cat=post.tags.find(t=>CATS[t]);
  const related=POSTS.filter(p=>p.id!==post.id&&cat&&p.tags.includes(cat)).slice(0,2);
  const relatedHtml=related.length?`
    <div class="post-divider"></div>
    <div class="related-title">Altri post in questa categoria</div>
    <div class="related-grid">${related.map(r=>`
      <a class="related-card" href="post.html?id=${r.id}">
        <div class="related-card-title">${r.title}</div>
        <div class="related-card-date">${formatDate(r.date)}</div>
      </a>`).join('')}</div>`:'';
  container.innerHTML=`
    <div class="post-tags">${tags}</div>
    <h1 class="post-title">${post.title}</h1>
    <div class="post-meta">${formatDate(post.date)}</div>
    ${cover}
    <div class="post-body">${post.content}</div>
    ${relatedHtml}`;
}

const st = document.getElementById('scrollTop');
window.addEventListener('scroll', () => st.classList.toggle('visible', window.scrollY > 300));
st.addEventListener('click', e => { e.preventDefault(); window.scrollTo({top:0,behavior:'smooth'}); });

</script>
</body>
</html>
