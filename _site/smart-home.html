  description: `
    <h2>La mia esperienza con la Smart Home</h2>

    <p>
    Il mio interesse per la smart home è nato quasi per caso nel 2019 con l’arrivo del primo assistente vocale in casa.
    Da allora la curiosità è diventata una vera passione e la nostra casa si è trasformata lentamente in un piccolo
    laboratorio di domotica.
    </p>

    <h3>La mia Smart Home in breve</h3>

    <div class="timeline">

        <div class="timeline-item">
        <span class="timeline-year">2019</span>
        <p>Arriva il primo Echo Dot</p>
        </div>

        <div class="timeline-item">
        <span class="timeline-year">2020</span>
        <p>Prime lampadine smart Wi-Fi</p>
        </div>

        <div class="timeline-item">
        <span class="timeline-year">2021</span>
        <p>Raspberry Pi e installazione di Home Assistant</p>
        </div>

        <div class="timeline-item">
        <span class="timeline-year">Oggi</span>
        <p>Rete Zigbee, automazioni e progetti con ESP32</p>
        </div>

    </div>

    <h3>L'inizio: il primo assistente vocale</h3>

    <p>
    Nel Natale del 2019 mia mamma ricevette come regalo da un suo collega di lavoro
    un Echo Dot (3ª generazione) di Amazon.
    Fino a quel momento in casa non era mai entrato un dispositivo dedicato alla domotica,
    ma quello fu il primo di quella che si sarebbe rivelata una lunga serie.
    </p>

    <p>
    Per alcuni mesi lo abbiamo utilizzato, affascinati dalla novità,
    per ascoltare musica, impostare timer, promemoria e svolgere altri compiti semplici.
    Nel frattempo l’argomento della smart home iniziava a incuriosirmi
    e così acquistai la mia prima lampadina smart Wi-Fi.
    </p>

    <h3>I primi esperimenti (e i primi problemi)</h3>

    <p>
    Con il passare del tempo, supportato da mia mamma (e facendo impazzire mio papà),
    la casa si è riempita di lampadine smart e altri dispositivi compatibili con Alexa.
    Chi ha un minimo di esperienza con la domotica può già immaginare il problema
    che si era creato: avevamo lampadine smart ma interruttori tradizionali.
    </p>

    <p>
    Il risultato era piuttosto curioso: non potevamo più usare gli interruttori
    per accendere o spegnere le luci, ma dovevamo parlare con Alexa.
    Più che una casa smart era diventata una casa un po’... stupida.
    </p>

    <p>
    Per un po’ la situazione rimase così, mentre io continuavo a informarmi
    su nuovi dispositivi e sulle possibilità offerte dalla domotica.
    </p>

    <h3>Il salto di qualità: Home Assistant</h3>

    <p>
    Nel 2021 arrivò finalmente il passo decisivo: mia mamma comprò un Raspberry Pi 4.
    Da quel momento iniziò la mia vera esperienza con la smart home.
    </p>

    <p>
    Insieme installammo Home Assistant e iniziai, passo dopo passo,
    a esplorare questo nuovo mondo fatto di integrazioni, automazioni
    e dispositivi di ogni tipo.
    </p>

    <p>
    Subito dopo l’arrivo del Raspberry arrivò anche una chiavetta Sonoff
    per creare una rete Zigbee.
    Con la rete Zigbee iniziarono ad arrivare molti altri dispositivi
    compatibili con questo protocollo e, lentamente,
    la casa si riempì di sensori, pulsanti e relè.
    </p>

    <h3>Imparare facendo</h3>

    <p>
    Oggi abbiamo dispositivi di varie tipologie e la nostra casa è ancora
    in continua evoluzione.
    Ogni tanto si aggiunge un nuovo sensore, un relè o un pulsante,
    e spesso nascono nuove automazioni.
    </p>

    <p>
    Oltre alla configurazione software, ho sviluppato anche alcune competenze manuali:
    dovendo installare molti dei dispositivi acquistati,
    ho imparato a mettere le mani (senza fare lavori troppo complessi)
    nell’impianto elettrico di casa.
    </p>

    <p>
    Per fare esperimenti un po’ più avanzati ho iniziato a utilizzare
    anche dei moduli ESP32 e ho imparato a fare qualche piccola saldatura.
    Sono capacità che oggi spesso vengono un po’ trascurate,
    ma che in realtà si rivelano molto utili quando si vuole costruire
    o modificare qualcosa da soli.
    </p>

    <h3>Una passione che continua</h3>

    <p>
    Devo ammettere che in questi anni il mondo della smart home
    mi ha affascinato parecchio e mi ha appassionato molto,
    forse come solo la musica aveva fatto prima.
    </p>

    <p>
    Mi piacerebbe, con il tempo, scrivere qualche articolo su questo sito
    per raccontare alcuni dei progetti che sono riuscito a realizzare.
    Chissà, magari potrebbero dare qualche idea anche a qualcun altro.
    </p>

  `,
