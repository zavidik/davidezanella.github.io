<html lang="it">
<head>

  <link rel="stylesheet" href="style.css">

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn, ecc.) -->

  <meta property="og:site_name"   content="Davide Zanella">
  <meta property="og:title"       content="Bacheca — Davide Zanella">
  <meta property="og:description" content="Articoli importanti e prossimi eventi">
  <meta property="og:url"         content="https://davidezanella.com/bacheca.html">
  <meta property="og:image"       content="https://davidezanella.com/img/profilo.jpg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale"      content="it_IT">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Bacheca — Davide Zanella">
  <meta name="twitter:description" content="Articoli importanti e prossimi eventi">

  <!-- Canonical URL (evita duplicati per Google) -->

  <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">

  <!-- Autore -->
  <meta name="author" content="Davide Zanella">

  <style>
    .past-section { margin-top: 40px; animation: fadeUp .5s .15s ease both; }
    .past-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; margin-top: 14px; opacity: .65; }
    @media(max-width:500px){ .past-grid{grid-template-columns:1fr} }
  </style>
<script>
  (function(){
    var v="?v="+Date.now();
    document.querySelectorAll('script[src],link[rel="stylesheet"]')
      .forEach(function(e){
        var a=e.tagName==="LINK"?"href":"src";
        var u=e.getAttribute(a);
        if(u&&u.indexOf("?")===-1&&!u.startsWith("http")&&!u.startsWith("//"))
          e.setAttribute(a,u+v);
      });
  })();
  </script>


</head>
<body>
<div class="container">
  <nav class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">Bacheca</span>
  </nav>
  <h1 class="page-title">📌 Bacheca</h1>
  <p class="page-sub">Prossimi eventi e avvisi in evidenza.</p>
  <div class="section-label" id="upcoming-label"></div>
  <div class="pinned-grid" id="upcoming-grid"></div>
  <div id="empty-state" style="display:none"><p class="empty-state">Nessun evento in programma al momento.</p></div>
  <div class="past-section" id="past-section" style="display:none">
    <div class="section-label">Eventi passati</div>
    <div class="past-grid" id="past-grid"></div>
  </div>
  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>

<script src="posts.js"></script>
<script src="blog-utils.js"></script>
<script src="nav.js"></script>
<script>
  initNav('bacheca.html');

  const upcoming = getUpcomingPinned();
  const past = getPastPinned();

  if (upcoming.length) {
    document.getElementById('upcoming-label').textContent = upcoming.length + ' in evidenza';
    document.getElementById('upcoming-grid').innerHTML = upcoming.map(buildPinnedCard).join('');
  } else {
    document.getElementById('upcoming-grid').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
  }
  if (past.length) {
    document.getElementById('past-section').style.display = 'block';
    document.getElementById('past-grid').innerHTML = past.map(buildPinnedCard).join('');
  }
</script>
</body>
</html>
