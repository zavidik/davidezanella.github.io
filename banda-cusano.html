    <p>Il Corpo Musicale Santa Cecilia di Cusano Milanino affonda le sue radici nei primi anni del '900, con la nascita della "Banda del Risveglio",
        che successivamente prese il nome di "Banda del Masera", dal nome dell'azienda che la ospitava.
        Quando l'azienda cessò la sua attività, anche la banda dovette fermarsi; alcuni componenti, però, spinti dalla passione per la musica,
        decisero di rifondare il gruppo dando vita al Corpo Musicale Santa Cecilia di Cusano Milanino,
        subito dopo la guerra, nel maggio del 1945.
    </p>
    <p>Dal 2021, con l'arrivo del maestro Stefano Bertoni e con la costituzione di un direttivo giovane e dinamico,
        la banda di Cusano Milanino sta vivendo una fase di grande crescita: non solo nel numero dei musicanti,
        ma anche nello spirito di aggregazione e nell'apprezzamento da parte del pubblico.
    </p>
    <p>Sono entrato a far parte della banda nel 2021, proprio dopo l'arrivo del nuovo maestro, che si è rivelato una persona incredibile
        e con il quale è nata un'amicizia anche al di fuori del contesto musicale.
        Da allora partecipo con entusiasmo all'attività della banda e ai concerti che sono diventati appuntamenti fissi e molto attesi
        dai cittadini: il Concerto di Natale, il Concerto per la Festa della Mamma e il Concerto d'Estate.
    </p>
