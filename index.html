<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davide Zanella</title>
  <meta name="description" content="Ciao, sono Davide Zanella — studente di Ingegneria Informatica al Politecnico di Milano, trombonista, tutor e appassionato di smart home.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .header { text-align: center; margin-bottom: 52px; animation: fadeUp .6s ease both; }
    .avatar-wrap { width: 110px; height: 110px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; border: 3px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,.12); transition: transform .3s, box-shadow .3s; }
    .avatar-wrap:hover { transform: scale(1.04); box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,5vw,2.4rem); font-weight: 700; letter-spacing: -.02em; margin-bottom: 8px; }
    .tagline { color: var(--muted); font-size: .95rem; font-weight: 300; }
    #main-grid { animation: fadeUp .6s .1s ease both; }
  </style>
<script>
  (function(){
    var v="?v="+Date.now();
    document.querySelectorAll('script[src],link[rel="stylesheet"]')
      .forEach(function(e){
        var a=e.tagName==="LINK"?"href":"src";
        var u=e.getAttribute(a);
        if(u&&u.indexOf("?")===-1&&!u.startsWith("http")&&!u.startsWith("//"))
          e.setAttribute(a,u+v);
      });
  })();
  </script>

</head>
<body>
<div class="container">
  <header class="header">
    <div class="avatar-wrap"><img src="img/profilo.jpg" alt="Davide Zanella"></div>
      <h1>Davide Zanella</h1>
    <p class="tagline">Ingegneria Informatica &middot; Trombone &middot; Tutoraggio &middot; Smart Home</p>
  </header>

  <div class="main-grid" id="main-grid"></div>

  <div class="section-head" style="animation:fadeUp .6s .2s ease both">
    <h2>📌 Bacheca</h2>
    <a href="bacheca.html">Vedi tutto &rarr;</a>
  </div>
  <div class="pinned-grid" id="bacheca-preview" style="animation:fadeUp .6s .22s ease both"></div>
  <div id="bacheca-empty" style="display:none;animation:fadeUp .6s .22s ease both">
    <p class="empty-state">Nessun avviso in evidenza al momento.</p>
  </div>

  <div class="section-head" style="animation:fadeUp .6s .28s ease both">
    <h2>📝 Ultimi articoli</h2>
    <a href="articoli.html">Vedi tutti &rarr;</a>
  </div>
  <div class="blog-grid" id="blog-preview" style="animation:fadeUp .6s .3s ease both"></div>
  <div class="blog-cta" style="animation:fadeUp .6s .34s ease both">
    <a href="articoli.html">Vedi tutti gli articoli &rarr;</a>
  </div>

  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>

<script src="posts.js"></script>
<script src="blog-utils.js"></script>
<script src="cards.js"></script>
<script src="nav.js"></script>
<script>
  initNav('index.html');
  initCards('main-grid');

  // Bacheca preview
  const pinned = getUpcomingPinned();
  if (pinned.length) {
    document.getElementById('bacheca-preview').innerHTML = pinned.slice(0,3).map(buildPinnedCard).join('');
  } else {
    document.getElementById('bacheca-preview').style.display = 'none';
    document.getElementById('bacheca-empty').style.display = 'block';
  }

  // Ultimi articoli (non pinnati)
  document.getElementById('blog-preview').innerHTML = getArticles().slice(0,4).map(buildArticleCard).join('');
</script>
</body>
</html>
