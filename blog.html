<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aggiornamenti — Davide Zanella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f7f5f2;--card:#ffffff;--text:#1a1a1a;--muted:#6b6b6b;--border:#e8e4de;
      --accent-music:#b5451b;--accent-study:#2b5797;--accent-content:#c4752a;--accent-tech:#2e7d5e;--accent-about:#5b3f8a;
      --shadow:0 2px 12px rgba(0,0,0,.07);--radius:16px;
    }
    @media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1c1c1c;--text:#f0ede8;--muted:#888;--border:#2a2a2a;--shadow:0 2px 16px rgba(0,0,0,.4)}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:40px 20px 80px}
    .container{max-width:820px;margin:0 auto}
    a{color:inherit}
    .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);text-decoration:none;margin-bottom:32px;transition:color .15s}
    .back-link:hover{color:var(--text)}
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:background .15s,color .15s,border-color .15s;cursor:pointer}
    .tag:hover,.tag.active{background:var(--text);color:var(--bg);border-color:var(--text)}
    .tag[data-cat=music]{border-color:var(--accent-music);color:var(--accent-music)}
    .tag[data-cat=study]{border-color:var(--accent-study);color:var(--accent-study)}
    .tag[data-cat=content]{border-color:var(--accent-content);color:var(--accent-content)}
    .tag[data-cat=tech]{border-color:var(--accent-tech);color:var(--accent-tech)}
    .tag[data-cat=about]{border-color:var(--accent-about);color:var(--accent-about)}
    .tag[data-cat=music].active{background:var(--accent-music);color:#fff;border-color:var(--accent-music)}
    .tag[data-cat=study].active{background:var(--accent-study);color:#fff;border-color:var(--accent-study)}
    .tag[data-cat=content].active{background:var(--accent-content);color:#fff;border-color:var(--accent-content)}
    .tag[data-cat=tech].active{background:var(--accent-tech);color:#fff;border-color:var(--accent-tech)}
    .tag[data-cat=about].active{background:var(--accent-about);color:#fff;border-color:var(--accent-about)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    .page-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;letter-spacing:-.02em;margin-bottom:8px;animation:fadeUp .5s ease both}
    .page-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px;animation:fadeUp .5s .05s ease both}

    /* filter bar */
    .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;animation:fadeUp .5s .1s ease both}

    /* blog grid */
    .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;animation:fadeUp .5s .15s ease both}
    .blog-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px 20px;text-decoration:none;color:var(--text);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;transition:transform .2s,box-shadow .2s,border-color .2s}
    .blog-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.11)}
    .blog-card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .blog-card-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;line-height:1.3}
    .blog-card-excerpt{font-size:.85rem;color:var(--muted);line-height:1.6;flex:1}
    .blog-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--muted)}
    .blog-card-arrow{transition:transform .15s}
    .blog-card:hover .blog-card-arrow{transform:translateX(3px)}
    .empty{color:var(--muted);font-size:.9rem;padding:32px 0;text-align:center}
    footer{text-align:center;margin-top:60px;font-size:.78rem;color:var(--muted)}
    @media(max-width:500px){.blog-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">&#8592; Home</a>
  <h1 class="page-title">Aggiornamenti</h1>
  <p class="page-sub" id="post-count"></p>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="blog-grid" id="blog-grid"></div>
  <footer><p>&copy; 2026 Davide Zanella</p></footer>
</div>

<script src="posts.js"></script>
<script>
const CATS = {music:1,study:1,content:1,tech:1,about:1};
const CAT_LABELS = {music:'Musica',study:'Studio',content:'Contenuti',tech:'Tech',about:'Su di me'};
function formatDate(d){const[y,m,day]=d.split('-');const M=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];return `${parseInt(day)} ${M[parseInt(m)]} ${y}`;}

let activeFilter = null;

// Build filter tags from all unique category tags
const allCats = [...new Set(POSTS.flatMap(p => p.tags.filter(t => CATS[t])))];
const filterBar = document.getElementById('filter-bar');
filterBar.innerHTML = allCats.map(cat =>
  `<span class="tag" data-cat="${cat}" data-filter="${cat}">${CAT_LABELS[cat]||cat}</span>`
).join('');

filterBar.querySelectorAll('.tag').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (activeFilter === f) { activeFilter = null; } else { activeFilter = f; }
    filterBar.querySelectorAll('.tag').forEach(b => b.classList.toggle('active', b.dataset.filter === activeFilter));
    renderGrid();
  });
});

function buildCard(post) {
  const tagsHtml = post.tags.slice(0,4).map(t=>`<span class="tag" ${CATS[t]?`data-cat="${t}"`:''} style="pointer-events:none">${t}</span>`).join('');
  return `<a class="blog-card" href="post.html?id=${post.id}">
    <div class="blog-card-tags">${tagsHtml}</div>
    <div class="blog-card-title">${post.title}</div>
    <div class="blog-card-excerpt">${post.excerpt}</div>
    <div class="blog-card-footer">
      <span>${formatDate(post.date)}</span>
      <span class="blog-card-arrow">&#8594;</span>
    </div>
  </a>`;
}

function renderGrid() {
  const filtered = activeFilter
    ? POSTS.filter(p => p.tags.includes(activeFilter))
    : POSTS;
  document.getElementById('post-count').textContent = `${filtered.length} post${filtered.length===1?'':''}`;
  document.getElementById('blog-grid').innerHTML = filtered.length
    ? filtered.map(buildCard).join('')
    : '<p class="empty">Nessun post trovato per questo filtro.</p>';
}

renderGrid();
</script>
</body>
</html>
